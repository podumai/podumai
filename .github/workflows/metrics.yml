name: 'Metrics'

on:
  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch: { }

  push:
    branches: [ 'main' ]

jobs:
  metrics:
    runs-on: 'ubuntu-24.04'
    permissions:
      contents: 'write'
    steps:
      - name: 'Generate metrics'
        uses: 'lowlighter/metrics@latest'
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          template: 'classic'
          base: 'header,activity,metadata,community,repositories'
          config_timezone: 'UTC'

          plugin_languages: 'yes'
          plugin_languages_details: 'bytes-size,percentages'
          plugin_languages_indepth: 'yes'
          plugin_languages_limit: 8
          plugin_languages_ignored: 'html,css,tex,Makefile'

          plugin_habits: 'yes'
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: 'yes'
          plugin_habits_trim: 'yes'

          plugin_followup: 'yes'
          plugin_followup_sections: 'user,repositories'
          plugin_followup_indepth: 'yes'

          plugin_topics: 'yes'
          plugin_topics_limit: 15
          plugin_topics_mode: 'icons'
          plugin_starlists: 'yes'
          plugin_starlists_limit: 5